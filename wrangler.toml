name = "cftokenssum-cts"
main = "worker/index.js"
compatibility_date = "2026-05-31"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[triggers]
crons = ["*/5 * * * *"]

# In the Cloudflare dashboard, bind a D1 database to this Worker with:
# Variable name: DB
#
# Optional runtime variables:
# CLIPROXY_BASE_URL = "https://your-cliproxy.example.com"
# USAGE_QUEUE_COUNT = "500"
# CLIPROXY_API_KEY = "optional bearer token if your management endpoint requires it"
# CLIPROXY_AUTH_HEADER = "X-Custom-Header: optional-value"
# CLIPROXY_HEADERS_JSON = "{\"X-Another-Header\":\"value\"}"
# ADMIN_TOKEN = "optional token for POST /api/ingest and write APIs"
